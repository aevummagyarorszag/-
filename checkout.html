<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aevum - Pénztár</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Aevum főoldal">
      Aevum
    </a>
  </header>

  <main class="checkout-container">
    <section class="checkout-form-section">
      <h2>Szállítási és rendelési adatok</h2>
      
      <form id="orderForm">
        
        <div class="form-group">
          <label for="nev">Teljes név *</label>
          <input type="text" id="nev" name="nev" required placeholder="Minta János">
        </div>

        <div class="form-group">
          <label for="email">E-mail cím *</label>
          <input type="email" id="email" name="email" required placeholder="minta.janos@gmail.com">
        </div>

        <div class="form-group">
          <label for="telefon">Telefonszám *</label>
          <input type="tel" id="telefon" name="telefon" required placeholder="+36 30 123 4567">
        </div>

        <div class="form-row" style="display: flex; gap: 15px;">
          <div class="form-group" style="flex: 1;">
            <label for="iranyitoszam">Irányítószám *</label>
            <input type="text" id="iranyitoszam" name="iranyitoszam" required placeholder="8000">
          </div>
          <div class="form-group" style="flex: 2;">
            <label for="varos">Város *</label>
            <input type="text" id="varos" name="varos" required placeholder="Székesfehérvár">
          </div>
        </div>

        <div class="form-group">
          <label for="utca_hazszam">Utca, házszám *</label>
          <input type="text" id="utca_hazszam" name="utca_hazszam" required placeholder="Fő utca 12. 2/4">
        </div>

        <input type="hidden" id="termek" name="termek" value="Aevum Mono">
        <input type="hidden" id="fizetett_osszeg" name="fizetett_osszeg" value="8990 Ft">
        <input type="hidden" id="kedvezmenyes" name="kedvezmenyes" value="Nem">

        <div class="form-group coupon-section">
          <label for="couponInput">Kuponkód (opcionális)</label>
          <div style="display: flex; gap: 10px;">
            <input type="text" id="couponInput" placeholder="KUPON10" style="flex: 1;">
            <button type="button" id="applyCouponBtn" class="bubble-button secondary small" style="margin: 0; padding: 10px 15px;">Alkalmaz</button>
          </div>
          <span id="couponMessage" style="font-size: 0.85rem; margin-top: 5px; display: block;"></span>
        </div>

        <div class="form-group checkbox-group" style="display: flex; align-items: flex-start; gap: 10px; margin-top: 20px;">
          <input type="checkbox" id="adatvedelem" name="adatvedelem" required style="width: auto; margin-top: 4px;">
          <label for="adatvedelem" style="font-size: 0.9rem; line-height: 1.4;">
            Elfogadom az <a href="adatvedelem.html" target="_blank" style="text-decoration: underline;">Adatkezelési Tájékoztatót</a> és hozzájárulok az adataim kezeléséhez. *
          </label>
        </div>

        <button type="submit" class="bubble-button primary" style="width: 100%; margin-top: 20px;">Rendelés leadása</button>
      </form>
    </section>

    <section class="checkout-summary-section">
      <h3>Rendelésed</h3>
      <div class="summary-item" style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee;">
        <span id="selectedWatchName">Aevum Mono</span>
        <span id="basePrice">8 990 Ft</span>
      </div>
      <div class="summary-total" style="display: flex; justify-content: space-between; padding: 20px 0; font-weight: bold; font-size: 1.2rem;">
        <span>Fizetendő végösszeg:</span>
        <span id="finalPriceDisplay">8 990 Ft</span>
      </div>
    </section>
  </main>

  <script>
    // 1. Óra típusának beolvasása az URL-ből
    const urlParams = new URLSearchParams(window.location.search);
    let selectedWatch = urlParams.get('ora') || "Aevum Mono";
    
    document.getElementById('selectedWatchName').innerText = selectedWatch;
    document.getElementById('termek').value = selectedWatch;

    let basePriceValue = 8990;
    let currentPriceValue = 8990;

    // 2. Kuponkód kezelése
    const couponInput = document.getElementById('couponInput');
    const applyBtn = document.getElementById('applyCouponBtn');
    const couponMessage = document.getElementById('couponMessage');
    const finalPriceDisplay = document.getElementById('finalPriceDisplay');
    const kedvezmenyesHidden = document.getElementById('kedvezmenyes');
    const fizetettOsszegHidden = document.getElementById('fizetett_osszeg');

    applyBtn.addEventListener('click', () => {
      const code = couponInput.value.trim().toUpperCase();
      if (code === "DIAK20") {
        currentPriceValue = Math.round(basePriceValue * 0.8); // 20% kedvezmény
        finalPriceDisplay.innerText = currentPriceValue.toLocaleString() + " Ft";
        fizetettOsszegHidden.value = currentPriceValue + " Ft";
        kedvezmenyesHidden.value = "Igen";
        
        couponMessage.style.color = "green";
        couponMessage.innerText = "Sikeres kupon! 20% kedvezmény levonva.";
      } else if (code === "") {
        couponMessage.innerText = "";
      } else {
        couponMessage.style.color = "red";
        couponMessage.innerText = "Érvénytelen kuponkód.";
        
        // Visszaállítás alapárra
        currentPriceValue = basePriceValue;
        finalPriceDisplay.innerText = basePriceValue.toLocaleString() + " Ft";
        fizetettOsszegHidden.value = basePriceValue + " Ft";
        kedvezmenyesHidden.value = "Nem";
      }
    });

    // 3. Adatküldés a megadott Google Scripthez
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmfuXKJFoaFWemBFzPDcs_JN0XKtBzb9PmFLlstRIOnYpuz2wGzEUM7_p89gnlhCYR/exec";

    const form = document.getElementById('orderForm');
    form.addEventListener('submit', e => {
      e.preventDefault();
      
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerText = "Feldolgozás...";

      // Form adatok összegyűjtése és URL-kódolt formátumba alakítása a Google Apps Script számára
      const formData = new FormData(form);
      const searchParams = new URLSearchParams();
      for (const pair of formData.entries()) {
        searchParams.append(pair[0], pair[1]);
      }

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: searchParams,
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.result === 'success') {
          window.location.href = "thankyou.html";
        } else {
          alert("Hiba történt a rendelés elküldésekor: " + data.error);
          submitBtn.disabled = false;
          submitBtn.innerText = "Rendelés leadása";
        }
      })
      .catch(error => {
        // Ha sikeresen beíródott az adat a Google-be, de a böngésző hálózati okokból
        // mégis hibát észlel, akkor is átirányítjuk a köszönő oldalra:
        window.location.href = "thankyou.html";
      });
    });
  </script>
</body>
</html>
