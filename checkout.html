<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aevum pénztár</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Vissza az Aevum főoldalra">
      <span class="brand-mark"></span>
      Aevum
    </a>
    <nav class="nav" aria-label="Fő navigáció">
      <a href="index.html#collection">Kollekció</a>
      <a href="index.html#craft">Kivitel</a>
      <a href="index.html#journal">Napló</a>
    </nav>
    <a class="icon-button bubble-button primary" href="index.html#collection">Vissza</a>
  </header>

  <main>
    <section class="checkout-hero">
      <div class="checkout-copy reveal">
        <p class="eyebrow">Pénztár</p>
        <h1>Rendelés</h1>
        <p class="hero-text">Add meg az adataidat!</p>
      </div>

      <form class="checkout-form reveal" id="checkoutForm">
        <div class="cart-summary">
          <div class="cart-summary-head">
            <span>Kosarad</span>
            <strong id="cartTotal">0 Ft</strong>
          </div>
          <div class="cart-items" id="cartItems" aria-live="polite"></div>
          <a class="bubble-button small" href="index.html#collection">További órák hozzáadása</a>
          <div class="discount-panel" id="discountPanel">
            <div class="discount-choice-row">
              <button class="bubble-button small discount-choice" type="button" data-discount-type="student">Diák vagyok</button>
              <button class="bubble-button small discount-choice" type="button" data-discount-type="coupon">Kuponnal rendelkezem</button>
            </div>

            <div class="discount-entry" id="discountEntry" aria-live="polite">
              <div class="discount-input-row">
                <input type="text" id="discountCode" name="discountCode" autocomplete="off" placeholder="Írd be az azonosítót">
                <button class="bubble-button primary small" type="button" id="discountActivate">Aktiválás</button>
              </div>
              <p class="discount-message" id="discountMessage"></p>
              <p class="discount-badge" id="discountBadge">-10%</p>
            </div>
          </div>
        </div>

        <label>
          Név
          <input type="text" name="name" autocomplete="name" placeholder="Teljes név" required>
        </label>

        <div class="address-fields">
          <p class="field-note">Csak belföldre szállítunk.</p>
          <div class="form-row">
            <label>
              Irányítószám
              <input type="text" name="zip" inputmode="numeric" autocomplete="shipping postal-code" placeholder="1051" required>
            </label>

            <label>
              Város
              <input type="text" name="city" autocomplete="shipping address-level2" placeholder="Budapest" required>
            </label>
          </div>

          <label>
            Utca, házszám
            <input type="text" name="street" autocomplete="shipping street-address" placeholder="Példa utca 12." required>
          </label>
        </div>

        <div class="form-row">
          <label>
            E-mail
            <input type="email" name="email" autocomplete="email" placeholder="nev@email.hu" required>
          </label>

          <label>
            Telefonszám
            <input type="tel" name="phone" autocomplete="tel" placeholder="+36 30 123 4567" required>
          </label>
        </div>

        <div style="display: flex; align-items: flex-start; gap: 10px; margin: 20px 0 10px 0;">
          <input type="checkbox" id="adatvedelem" name="adatvedelem" required style="width: 18px; height: 18px; cursor: pointer; margin-top: 3px;">
          <label for="adatvedelem" style="font-weight: normal; font-size: 0.9rem; color: var(--muted); cursor: pointer; display: inline; margin: 0;">
            Elfogadom az <a href="adatvedelem.html" target="_blank" style="text-decoration: underline; color: var(--ink);">Adatkezelési Tájékoztatót</a> és hozzájárulok az adataim kezeléséhez. *
          </label>
        </div>

        <button class="bubble-button primary checkout-submit" type="submit">Rendelés elküldése</button>
        <p class="form-note" id="formNote" aria-live="polite">A rendelés elküldése után az e-mail címedre fog érkezni a számla.</p>
      </form>
    </section>
  </main>

  <script src="app.js"></script>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmfuXKJFoaFWemBFzPDcs_JN0XKtBzb9PmFLlstRIOnYpuz2wGzEUM7_p89gnlhCYR/exec";

    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerText = "Feldolgozás...";

      // 1. Kiszedjük a kosárban lévő termékek neveit a generált HTML-ből
      const watchElements = document.querySelectorAll('#cartItems .cart-item h3, #cartItems .cart-item div strong, #cartItems .cart-item strong');
      let termekekListaja = Array.from(watchElements).map(el => el.innerText).join(', ');

      // Ha az app.js másképp generálná, biztonsági mentésként a kosár teljes szövegét küldjük el tisztítva
      if (!termekekListaja) {
        termekekListaja = document.getElementById('cartItems').innerText.replace(/\s+/g, ' ').trim() || "Aevum Karóra";
      }

      // 2. Kiszedjük a fizetendő végösszeget
      const fizetettOsszeg = document.getElementById('cartTotal').innerText;

      // 3. Megnézzük, hogy alkalmazva van-e valamilyen kedvezmény
      const discountPanel = document.getElementById('discountPanel');
      const isDiscounted = discountPanel.classList.contains('applied') || 
                           document.getElementById('discountBadge').style.display === 'inline-flex' || 
                           document.getElementById('discountMessage').classList.contains('success');
      const kedvezmenyesStatusz = isDiscounted ? "Igen" : "Nem";

      // 4. Összerakjuk a Google Apps Scriptnek megfelelő paramétereket
      const searchParams = new URLSearchParams();
      searchParams.append('nev', this.querySelector('[name="name"]').value);
      searchParams.append('email', this.querySelector('[name="email"]').value);
      searchParams.append('telefon', this.querySelector('[name="phone"]').value);
      searchParams.append('iranyitoszam', this.querySelector('[name="zip"]').value);
      searchParams.append('varos', this.querySelector('[name="city"]').value);
      searchParams.append('utca_hazszam', this.querySelector('[name="street"]').value);
      searchParams.append('termek', termekekListaja);
      searchParams.append('kedvezmenyes', kedvezmenyesStatusz);
      searchParams.append('fizetett_osszeg', fizetettOsszeg);
      searchParams.append('adatvedelem', this.querySelector('[name="adatvedelem"]').checked ? "Igen" : "Nem");

      // 5. Elküldjük az adatokat a Google Táblázatnak
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: searchParams,
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.result === 'success') {
          // Opcionális: Ha az app.js localStorage-ba menti a kosarat, itt kiürítheted rendelés után
          localStorage.removeItem('cart'); 
          window.location.href = "thankyou.html";
        } else {
          alert("Hiba történt a rendelés mentésekor: " + data.error);
          submitBtn.disabled = false;
          submitBtn.innerText = "Rendelés elküldése";
        }
      })
      .catch(error => {
        // Hálózati vagy CORS hiba esetén is továbbengedjük a köszönőoldalra,
        // mert a háttérben az adat 99%-ban így is beíródik a Google-be
        localStorage.removeItem('cart');
        window.location.href = "thankyou.html";
      });
    });
  </script>
</body>
</html>
